spring:
  application:
    name: core-api

  # Default local infra is the compose-managed postgres on host :5433.
  # Override SPRING_DATASOURCE_URL if you intentionally reuse an external
  # postgres cluster instead.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/aipipeline}
    username: ${SPRING_DATASOURCE_USERNAME:aipipeline}
    password: ${SPRING_DATASOURCE_PASSWORD:aipipeline_pw}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

aipipeline:
  storage:
    backend: local
    local:
      # Runs from core-api/ directory; resolves to the shared {repo}/local-storage
      # folder, which the worker also points at by default.
      root-dir: ${AIPIPELINE_STORAGE_LOCAL_ROOT_DIR:${user.dir}/../local-storage}
    s3:
      endpoint: ${AIPIPELINE_STORAGE_S3_ENDPOINT:http://localhost:9000}
      region: ${AIPIPELINE_STORAGE_S3_REGION:us-east-1}
      bucket: ${AIPIPELINE_STORAGE_S3_BUCKET:aipipeline-artifacts}
      access-key: ${AIPIPELINE_STORAGE_S3_ACCESS_KEY:aipipeline}
      secret-key: ${AIPIPELINE_STORAGE_S3_SECRET_KEY:aipipeline_secret}
    signed-url:
      ttl-seconds: 600
  queue:
    backend: redis
    redis:
      pending-key: ${AIPIPELINE_QUEUE_PENDING_KEY:aipipeline:jobs:pending}
      inflight-key: ${AIPIPELINE_QUEUE_INFLIGHT_KEY:aipipeline:jobs:inflight}
  worker:
    callback-base-url: ${AIPIPELINE_WORKER_CALLBACK_BASE_URL:http://localhost:8080}
  claim:
    lease-seconds: 900
  internal:
    secret: ${AIPIPELINE_INTERNAL_SECRET:}

---
# Compatibility profile for older docs/scripts that still pass `independent`.
#   mvn spring-boot:run -Dspring-boot.run.profiles=independent
spring:
  config:
    activate:
      on-profile: independent
  datasource:
    url: jdbc:postgresql://localhost:5433/aipipeline
    username: aipipeline
    password: aipipeline_pw
