<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>Form Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: 18px 22px; font-family: var(--font-sans); }
  .lead { font-family: var(--font-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.18em; color: hsl(var(--muted-foreground)); margin: 0 0 12px; }
  .col { display:flex; flex-direction:column; gap: 12px; }
  label { font-family: var(--font-sans); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.14em; color: hsl(var(--muted-foreground)); }
  input, textarea { font: inherit; box-sizing: border-box; width: 100%; height: 36px; padding: 0 12px; background: transparent; border: 1px solid hsl(var(--input)); border-radius: 6px; box-shadow: var(--shadow-sm); color: hsl(var(--foreground)); font-size: 13px; transition: border-color .12s, box-shadow .12s; }
  textarea { height: 80px; padding: 8px 12px; font-family: var(--font-mono); font-size: 12.5px; line-height: 1.6; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: hsl(var(--ring)); box-shadow: 0 0 0 2px hsl(var(--ring)/.2); }
  input::placeholder, textarea::placeholder { color: hsl(var(--muted-foreground)); }
  .grp { display:flex; flex-direction:column; gap: 6px; }
</style>
</head>
<body>
  <div class="lead">Inputs · text · textarea · focus = ring on primary</div>
  <div class="col">
    <div class="grp">
      <label>Base URL</label>
      <input class="t-mono" type="text" value="http://localhost:8080" />
    </div>
    <div class="grp">
      <label>프롬프트</label>
      <textarea placeholder="워커에게 전달할 프롬프트…">새 콘솔에서 보내는 인사</textarea>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
