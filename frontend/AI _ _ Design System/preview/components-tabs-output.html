<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>Tabs & Output</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 22px; font-family: var(--font-sans); }
  .lead { font-family: var(--font-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.18em; color: hsl(var(--muted-foreground)); margin: 0 0 12px; }
  .tabs { display:flex; gap: 0; border-bottom: 1px solid hsl(var(--border)/.6); padding: 0 12px; }
  .tab { position: relative; padding: 10px 14px; font-size: 11.5px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.14em; color: hsl(var(--muted-foreground)); border-bottom: 2px solid transparent; }
  .tab.active { color: hsl(var(--foreground)); border-bottom-color: hsl(var(--primary)); }
  .tab .badge { display: inline-block; margin-left: 6px; padding: 1px 6px; border-radius: 999px; background: hsl(var(--muted)); font-family: var(--font-mono); font-size: 9.5px; color: hsl(var(--muted-foreground)); }
  .pre { margin-top: 14px; max-height: 220px; overflow:auto; padding: 14px; border: 1px solid hsl(var(--border)); background: hsl(var(--card)); border-radius: 6px; font-family: var(--font-mono); font-size: 12.5px; line-height: 1.6; color: hsl(var(--foreground)/.9); box-shadow: var(--shadow-soft); font-feature-settings: "calt" 0; }
</style>
</head>
<body>
  <div class="lead">Tabs · slim underline · count badge</div>
  <div class="tabs">
    <span class="tab active">결과</span>
    <span class="tab">아티팩트<span class="badge">3</span></span>
    <span class="tab">원본</span>
  </div>
  <pre class="pre">{
  "jobId": "a3f9c2-7e1b-44d8",
  "capability": "RAG",
  "status": "SUCCEEDED",
  "topHit": {
    "doc": "anime-005#overview",
    "score": 0.845,
    "answer": "The Harbor Cats"
  }
}</pre>
</body>
</html>
