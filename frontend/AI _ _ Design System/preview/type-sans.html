<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type — Sans Specimen</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 18px 22px; }
  .lead { font-family: var(--font-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.18em; color: hsl(var(--muted-foreground)); margin: 0 0 14px; }
  .row { display:flex; gap: 18px; align-items: baseline; padding: 4px 0; }
  .meta { width: 110px; font-family: var(--font-mono); font-size: 10px; color: hsl(var(--muted-foreground)); text-transform: uppercase; letter-spacing: 0.14em; }
  .x { font-family: var(--font-sans); }
</style>
</head>
<body>
  <div class="lead">Sans · Inter + Noto Sans KR · -0.005em base tracking</div>
  <div class="row"><div class="meta">14 / 600</div><div class="x" style="font-size:14px; font-weight:600; letter-spacing:-0.01em;">AI 파이프라인 콘솔 — Console</div></div>
  <div class="row"><div class="meta">12.5 / 500</div><div class="x" style="font-size:12.5px; font-weight:500;">새 작업 — Submit a job to the pipeline</div></div>
  <div class="row"><div class="meta">12 / 400</div><div class="x" style="font-size:12px; color: hsl(var(--muted-foreground));">파일과 함께 사용할 질문 (선택). Plain body copy in muted tone.</div></div>
  <div class="row"><div class="meta">11 / 600 ↑</div><div class="x" style="font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.16em; color: hsl(var(--muted-foreground));">기능 · capability</div></div>
</body>
</html>
