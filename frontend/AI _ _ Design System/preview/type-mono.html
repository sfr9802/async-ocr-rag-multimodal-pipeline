<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type — Mono Specimen</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 18px 22px; }
  .lead { font-family: var(--font-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.18em; color: hsl(var(--muted-foreground)); margin: 0 0 14px; }
  .row { display:flex; gap: 18px; align-items: baseline; padding: 4px 0; }
  .meta { width: 110px; font-family: var(--font-mono); font-size: 10px; color: hsl(var(--muted-foreground)); text-transform: uppercase; letter-spacing: 0.14em; }
  .m { font-family: var(--font-mono); font-feature-settings: "calt" 0; font-variant-ligatures: none; }
</style>
</head>
<body>
  <div class="lead">Mono · JetBrains Mono · machine-emitted strings</div>
  <div class="row"><div class="meta">12 / 500</div><div class="m" style="font-size:12px;">jobId = a3f9c2-7e1b-44d8</div></div>
  <div class="row"><div class="meta">11 / tabnum</div><div class="m" style="font-size:11px; font-variant-numeric: tabular-nums;">application/json · 1.2 KB · a3f9c2…</div></div>
  <div class="row"><div class="meta">10.5 ↑ 0.16</div><div class="m" style="font-size:10.5px; text-transform:uppercase; letter-spacing:0.16em; color: hsl(var(--muted-foreground));">async · ocr · rag · multimodal</div></div>
  <div class="row"><div class="meta">9.5 ↑ 0.18</div><div class="m" style="font-size:9.5px; text-transform:uppercase; letter-spacing:0.18em; color: hsl(var(--muted-foreground));">PENDING — RUNNING — SUCCEEDED</div></div>
</body>
</html>
