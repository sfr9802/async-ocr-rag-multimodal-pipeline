<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 파이프라인 콘솔 — UI Kit</title>

  <!-- Design system tokens + components -->
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <link rel="stylesheet" href="console.css" />

  <!-- Iconography -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Components in dependency order. Each exposes itself on window. -->
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="StatusBadge.jsx"></script>
  <script type="text/babel" src="JobTimeline.jsx"></script>
  <script type="text/babel" src="CapabilityPicker.jsx"></script>
  <script type="text/babel" src="FileDropzone.jsx"></script>
  <script type="text/babel" src="SubmitForm.jsx"></script>
  <script type="text/babel" src="ResultViewer.jsx"></script>
  <script type="text/babel" src="JobSidebar.jsx"></script>
  <script type="text/babel" src="ConsoleScreen.jsx"></script>

  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ConsoleScreen />);
  </script>
</body>
</html>
