# Active Phase 7 v4 eval config template.
#
# This template is intentionally conservative: it opens a schema-valid
# Phase 7 v4 active config without requesting full indexing, full retrieval
# evaluation, a tuning sweep, an MMR sweep, or answerability scoring.

experiment_id: phase7-v4-active-template

objective:
  mode: rag
  dataset: eval/reports/phase7/seeds/llm_silver_focus_50/queries_v4_llm_silver_focus_50.jsonl
  primary_metric: mrr
  secondary_metrics:
    - mean_hit_at_k
    - mean_total_ms

search_space:
  # Single fixed point. Broader search spaces must be introduced in a
  # separate reviewed change.
  rag_top_k:
    type: categorical
    choices: [10]

optuna:
  sampler: random
  n_trials: 1
  seed: 42
  direction: maximize

_meta:
  created_by: codex
  status: active_template
  fail_closed: false
  phase7_v4_guardrail: true
  scope: config validation and explicitly approved smoke runs only
  execution_policy:
    allow_full_indexing: false
    allow_full_retrieval_eval: false
    allow_tuning_sweep: false
    allow_mmr_sweep: false
    allow_answerability_scoring: false
  phase7_5_reference:
    status: reference_only
    note: >
      Keep recommended production values in the Phase 7.5 reports. This
      template does not start a new tuning search.
  canonical_v4_artifacts:
    pages_v4: eval/corpora/namu-v4-structured-combined/pages_v4.jsonl
    chunks_v4: eval/corpora/namu-v4-structured-combined/chunks_v4.jsonl
    rag_chunks: eval/corpora/namu-v4-structured-combined/rag_chunks.jsonl
    split_manifest: eval/corpora/namu-v4-structured-combined/split_manifest.json
    split_manifest_report: eval/corpora/namu-v4-structured-combined/split_manifest.report.json
    validation_report: eval/corpora/namu-v4-structured-combined/validation_report.json
  answerability_audit:
    production_join_chunks: eval/corpora/namu-v4-structured-combined/rag_chunks.jsonl
    forbidden_production_join_chunks: eval/corpora/namu-v4-structured-combined/chunks_v4.jsonl
    chunks_v4_is_production_retrieval_join_fixture: false
    note: >
      Production retrieval emits join against rag_chunks.jsonl chunk ids.
      chunks_v4.jsonl is a canonical structured artifact, not a production
      retrieval join fixture.
  notes: |
    This file is open for config validation and small, explicitly approved
    smoke runs. Do not launch a full eval, indexing job, search sweep, MMR
    sweep, or answerability scoring pass from this template.
